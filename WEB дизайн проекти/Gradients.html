<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>gradients</title>
    <style>
        body {
            background-color: teal;
        }
        p {
            color: red;
            font-size: 1in;
            background: linear-gradient(to left, green, aqua);
        }
        div {
            width: 300px;
            height: 300px;
            margin: 30px;
            float: left;
        }
    </style>
</head>
<body>
    <hr Style="background: linear-gradient(to right, red, blue,green); width: 50%; height: 40px;">
    <p margin="300px">на данному зображенні ми можемо побачити лінійний градієнт і в коді сказано те що кольори будуть іти з права на ліво. Якщоб ми написали "to left" то тоді б кольри йшили б не з ліва на право, а з права на ліво</p>
    <div style="background: linear-gradient(to right, blue,yellow);"></div>
    <div style="background: linear-gradient(45deg, blue,yellow);"></div>
    <div style="background: linear-gradient(225deg, blue,yellow);"></div>
    <div style="background: linear-gradient(to right, red 50%, green 50%);"></div>
    <div style="background: linear-gradient(blue 50%,yellow 50%); width: 450px;"></div>
    <div style="background: linear-gradient(to bottom, red 0% 25%,darkblue 25% 50%,yellow 50% 75%,green 75% 100%); width: 450px;"></div>
    <div style="background: radial-gradient(circle at 25% 25%, red, blue, green 50%); border-radius: 3in;"></div>
    <div style="background: radial-gradient(circle at 75% 75%,blue,yellow 75%); border-radius: 3in;"></div>
    <div style="background: radial-gradient(circle at 50% 0%, yellow 5%, blue 50%);"></div>
    <div style="background: conic-gradient(at 25% 25%, yellow 0% 25%, blue 25%);"></div>
    <div style="background: repeating-linear-gradient(yellow 10%, blue 20%);"></div>
</body>
</html>
